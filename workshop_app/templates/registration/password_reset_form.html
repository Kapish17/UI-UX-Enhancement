{% extends 'workshop_app/base.html' %}

{% block title %}
Forgot Password
{% endblock %}

{% block content %}

<style>

.reset-container{
min-height:70vh;
display:flex;
align-items:center;
justify-content:center;
}

.reset-card{
width:450px;
padding:35px;
border-radius:14px;
background:white;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
transition:0.3s;
}

.reset-card:hover{
transform:translateY(-3px);
box-shadow:0 20px 45px rgba(0,0,0,0.2);
}

.reset-title{
text-align:center;
font-weight:600;
margin-bottom:10px;
}

.reset-subtitle{
text-align:center;
font-size:14px;
color:#666;
margin-bottom:25px;
}

.input-group{
position:relative;
}

.input-group input{
padding-left:40px;
}

.input-icon{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#777;
}

</style>


<div class="reset-container">

<div class="reset-card">

<h4 class="reset-title">
<i class="fa fa-lock"></i> Forgot Password
</h4>

<p class="reset-subtitle">
Enter your registered email address to receive a password reset link
</p>

<form method="post">

{% csrf_token %}

<div class="form-group">

<label>Email Address</label>

<div class="input-group">

<i class="fa fa-envelope input-icon"></i>

{{ form.email }}

</div>

</div>

<div class="text-center mt-4">

<button type="submit" class="btn btn-success mr-2">
<i class="fa fa-paper-plane"></i> Request Reset
</button>

<a href="{% url 'workshop_app:login' %}" class="btn btn-info">
Cancel
</a>

</div>

</form>

</div>

</div>

{% endblock %}
