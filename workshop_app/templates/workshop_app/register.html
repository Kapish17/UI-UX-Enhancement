{% extends 'workshop_app/base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<style>
label.required::after {
    content: "*";
    color: red;
}

.errorlist {
    color: red;
}

.register-card {
    max-width: 700px;
    margin: auto;
    margin-top: 40px;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    background: white;
}

.register-title {
    text-align: center;
    margin-bottom: 25px;
}

.register-btn {
    width: 100%;
}
</style>

<div class="container">

    <div class="register-card">

        <h3 class="register-title">Coordinator Registration</h3>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <br>

            <button class="btn btn-primary register-btn" type="submit">
                Register
            </button>

        </form>

    </div>

</div>

{% endblock %}
