{% extends 'workshop_app/base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<style>

.register-container{
    min-height:70vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.register-card{
    width:700px;
    padding:35px;
    border-radius:12px;
    background:white;
    box-shadow:0 12px 30px rgba(0,0,0,0.15);
}

.register-title{
    text-align:center;
    font-weight:600;
    margin-bottom:25px;
}

.table td{
    padding:12px;
}

</style>


<div class="register-container">

<div class="register-card">

<h3 class="register-title">
Coordinator Registration
</h3>

<form method="post">

{% csrf_token %}

<table class="table table-borderless">

{{ form.as_table }}

</table>

<div class="text-center mt-3">

<button class="btn btn-primary px-5" type="submit">
Register
</button>

</div>

</form>

</div>

</div>

{% endblock %}
